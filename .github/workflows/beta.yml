name: Beta (TestFlight)
on:
  push:
    branches: [release/*]
  workflow_dispatch:

jobs:
  beta:
    name: Build & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pick the newest Xcode 26.x on the runner (matches ci.yml).
      - name: Select Xcode 26
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Set up Ruby + bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # fastlane builds + signs and writes Drift.ipa to the repo root.
      - name: Build & sign via fastlane
        run: bundle exec fastlane build_only
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          APP_STORE_TEAM_ID: ${{ secrets.APP_STORE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      # Upload via the App Store Connect REST API. This avoids Xcode 26's broken
      # altool ("Failed to generate JWT token (259)"). The api-private-key input
      # takes the RAW .p8 contents (BEGIN PRIVATE KEY block), not base64.
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: "Drift.ipa"
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY_RAW }}
          backend: AppStoreAPI
          wait-for-processing: "false"
