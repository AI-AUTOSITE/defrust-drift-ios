name: CI
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pick the newest Xcode 26.x on the runner (falls back to default if absent)
      - name: Select Xcode 26
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages/checkouts
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: dd-${{ runner.os }}-${{ hashFiles('**/*.swift') }}
          restore-keys: |
            dd-${{ runner.os }}-

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Drift.xcodeproj \
            -scheme Drift

      - name: Install SwiftLint & xcbeautify
        run: brew install swiftlint xcbeautify

      - name: SwiftLint
        run: swiftlint --strict --reporter github-actions-logging

      # DefrustKit is vendored later; guard so Day 1 passes before it exists
      - name: Verify zero third-party production deps
        run: |
          if [ -f DefrustKit/Package.swift ] && grep -q 'package(url:' DefrustKit/Package.swift; then
            echo "::error::DefrustKit must have no third-party prod deps"
            exit 1
          fi

      - name: Run Unit Tests (Swift Testing)
        run: |
          set -o pipefail

          # Find ANY available iOS simulator by its UDID.
          # Pinning a device name + "OS=latest" (e.g. "iPhone 16") breaks whenever the
          # GitHub runner image or default Xcode changes — which is exactly what happened.
          # Looking up an available device id at runtime survives those changes.
          find_ios_sim() {
            xcrun simctl list devices --json \
              | jq -r '[.devices | to_entries[] | select(.key | test("iOS")) | .value[] | select(.isAvailable == true) | .udid] | first // empty'
          }

          DEVICE_ID="$(find_ios_sim)"

          # If the active Xcode has no iOS simulator runtime installed, download it once.
          if [ -z "$DEVICE_ID" ]; then
            echo "No iOS simulator found — downloading the iOS platform (one-time)…"
            xcodebuild -downloadPlatform iOS
            DEVICE_ID="$(find_ios_sim)"
          fi

          if [ -z "$DEVICE_ID" ]; then
            echo "::error::No iOS simulator available on this runner."
            xcrun simctl list devices
            exit 1
          fi

          echo "Running tests on simulator id: $DEVICE_ID"

          # Skip the StoreKit suite on CI. SKTestSession is unreliable on the runner's
          # simulator (cold-start hangs; FB22237318 on 26.3–26.5) and these are validated
          # locally instead. The suite's `.enabled(if: env["CI"] == nil)` trait does NOT
          # fire here: the runner's CI=true is a HOST var and is not forwarded into the
          # simulator test process, so the skip must be expressed at the xcodebuild level.
          xcodebuild test \
            -project Drift.xcodeproj \
            -scheme Drift \
            -testPlan DriftUnit \
            -skip-testing:DriftTests/DriftStorePurchaseTests \
            -destination "id=$DEVICE_ID" \
            -resultBundlePath build/TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: build/TestResults.xcresult
